<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase Storage Upload</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDZQF_W8vY9xGxqHkKx5Kx5KxKx5Kx5Kx5",
            authDomain: "university-saas-7b31e.firebaseapp.com",
            databaseURL: "https://university-saas-7b31e-default-rtdb.firebaseio.com",
            projectId: "university-saas-7b31e",
            storageBucket: "university-saas-7b31e.firebasestorage.app",
            messagingSenderId: "965564251051",
            appId: "1:965564251051:web:..."
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        window.testUpload = async function() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Choisissez un fichier');
                return;
            }

            console.log('File:', file.name, file.size, 'bytes');
            
            const storageRef = ref(storage, `test/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);

            uploadTask.on('state_changed',
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById('progress').innerText = 'Upload: ' + Math.round(progress) + '%';
                    console.log('Progress:', progress);
                },
                (error) => {
                    console.error('Error:', error);
                    document.getElementById('result').innerText = 'Error: ' + error.message;
                },
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    console.log('Success:', downloadURL);
                    document.getElementById('result').innerText = 'Success! URL: ' + downloadURL;
                }
            );
        }
    </script>
</head>
<body>
    <h1>Test Firebase Storage Upload</h1>
    <input type="file" id="fileInput">
    <button onclick="testUpload()">Upload</button>
    <div id="progress"></div>
    <div id="result"></div>
</body>
</html>
